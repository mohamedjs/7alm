<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="100%" height="100%">
  <defs>
    <!-- Matte white metal finish -->
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#F1F5F9" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <!-- Metallic hinges -->
    <linearGradient id="hinge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Soft LED warm yellow illumination glow -->
    <linearGradient id="light-beam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" stop-opacity="0.5" />
      <stop offset="60%" stop-color="#FDE047" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FDE047" stop-opacity="0" />
    </linearGradient>

    <!-- Lamp shadow -->
    <filter id="lamp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- LED Light Glow (Illuminates the desk below, empty background around it) -->
  <polygon points="120,240 280,240 380,680 20,680" fill="url(#light-beam)" pointer-events="none" />

  <g filter="url(#lamp-shadow)" transform="translate(0, 100)">
    <!-- Base Plate (Minimal circle resting on desk) -->
    <ellipse cx="200" cy="560" rx="90" ry="24" fill="url(#body-grad)" stroke="#CBD5E1" stroke-width="1.5" />
    <!-- Touch control indicators on the base -->
    <circle cx="200" cy="552" r="6" fill="#0891B2" opacity="0.8" />
    <circle cx="170" cy="554" r="3" fill="#94A3B8" />
    <circle cx="230" cy="554" r="3" fill="#94A3B8" />

    <!-- Lower Arm (Sleek upright rod) -->
    <path d="M194,560 L180,320 L190,320 L204,560 Z" fill="url(#body-grad)" stroke="#94A3B8" stroke-width="1" />

    <!-- Joint hinge (Bottom) -->
    <circle cx="199" cy="550" r="10" fill="url(#hinge-grad)" />

    <!-- Middle adjustable hinge -->
    <g transform="translate(185, 320)">
      <circle cx="0" cy="0" r="14" fill="url(#hinge-grad)" />
      <circle cx="0" cy="0" r="6" fill="#F1F5F9" />
    </g>

    <!-- Upper Arm (Angled forward) -->
    <path d="M185,320 L275,170 C278,165 285,165 288,170 L292,174 C295,179 293,186 288,190 L185,320 Z" fill="url(#body-grad)" />

    <!-- Top lamp head adjustment hinge -->
    <g transform="translate(285, 175)">
      <circle cx="0" cy="0" r="10" fill="url(#hinge-grad)" />
    </g>

    <!-- LED Light Bar Head (Horizontal/slanted sleek panel) -->
    <g transform="translate(285, 175) rotate(-22)">
      <!-- Top cover -->
      <path d="M-10,-6 L180,-6 C186,-6 190,-2 190,4 L190,16 C190,22 186,26 180,26 L-10,26 Z" fill="url(#body-grad)" stroke="#CBD5E1" stroke-width="1" />
      <!-- LED light panel (Yellow emitter band on the underside) -->
      <rect x="0" y="8" width="170" height="10" rx="2" fill="#FEF08A" stroke="#CA8A04" stroke-width="1" />
    </g>
  </g>
</svg>
