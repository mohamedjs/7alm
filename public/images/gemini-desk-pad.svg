<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="100%" height="100%">
  <defs>
    <!-- Desk Pad base gradient (dark sleek carbon/slate) -->
    <linearGradient id="pad-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2030" />
      <stop offset="50%" stop-color="#151724" />
      <stop offset="100%" stop-color="#0A0C16" />
    </linearGradient>

    <!-- Glowing border gradient -->
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- Shadow for perspective depth -->
    <filter id="pad-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Perspective group to angle the desk mat -->
  <g filter="url(#pad-shadow)" transform="translate(0, 150)">
    <!-- Main angled Mat Body -->
    <path d="M40,360 L360,320 L360,180 L40,220 Z" fill="url(#pad-base)" stroke="url(#neon-glow)" stroke-width="3.5" />
    
    <!-- Neon edge accent light -->
    <path d="M40,360 L360,320" stroke="#00F5FF" stroke-width="1.5" stroke-opacity="0.7" fill="none" />

    <!-- Grid / Tech Pattern on Mat -->
    <path d="M40,300 L360,260 M40,260 L360,220 M120,350 L120,210 M200,340 L200,200 M280,330 L280,190" 
          stroke="#3B82F6" stroke-width="0.7" stroke-opacity="0.12" fill="none" />

    <!-- Terminal Code / Gemini Commands printed on the mat (Vector path/text lines) -->
    <!-- Brand / Title -->
    <text x="60" y="248" fill="#00F5FF" font-family="monospace" font-size="11" font-weight="bold" opacity="0.8" transform="skewY(-6.5)">
      GEMINI CORE TERMINAL
    </text>
    <text x="60" y="260" fill="#8B5CF6" font-family="monospace" font-size="7" opacity="0.6" transform="skewY(-6.5)">
      VERSION 3.5 // AGENT INTERACTION
    </text>

    <!-- Code Block 1 -->
    <text x="60" y="280" fill="#E2E8F0" font-family="monospace" font-size="7.5" opacity="0.75" transform="skewY(-6.5)">
      $ gemini run --agent=antigravity
    </text>
    <text x="60" y="292" fill="#E2E8F0" font-family="monospace" font-size="7.5" opacity="0.75" transform="skewY(-6.5)">
      $ model.generate_content(prompt)
    </text>
    <text x="60" y="304" fill="#3B82F6" font-family="monospace" font-size="7.5" opacity="0.75" transform="skewY(-6.5)">
      $ ctx_compose --analyze --interactive
    </text>
    <text x="60" y="316" fill="#10B981" font-family="monospace" font-size="7.5" opacity="0.9" transform="skewY(-6.5)">
      &gt; SUCCESS: BUILD COMPLETION [OK]
    </text>

    <!-- Code Block 2 (Right side details) -->
    <text x="210" y="240" fill="#E2E8F0" font-family="monospace" font-size="7" opacity="0.5" transform="skewY(-6.5)">
      import google.generativeai as genai
    </text>
    <text x="210" y="250" fill="#E2E8F0" font-family="monospace" font-size="7" opacity="0.5" transform="skewY(-6.5)">
      config = genai.GenerationConfig(
    </text>
    <text x="220" y="260" fill="#3B82F6" font-family="monospace" font-size="7" opacity="0.5" transform="skewY(-6.5)">
      temperature=0.7, top_p=0.95
    </text>
    <text x="210" y="270" fill="#E2E8F0" font-family="monospace" font-size="7" opacity="0.5" transform="skewY(-6.5)">
      )
    </text>

    <!-- Decorative status indicator circle -->
    <circle cx="330" cy="210" r="4" fill="#10B981" />
    <circle cx="330" cy="210" r="8" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.5" />

    <!-- Minimal Mouse silhouette sitting on the mat -->
    <g transform="translate(290, 270) rotate(-6.5)">
      <rect x="0" y="0" width="22" height="36" rx="11" fill="#0A0C16" stroke="#475569" stroke-width="1.5" />
      <line x1="11" y1="0" x2="11" y2="15" stroke="#475569" stroke-width="1.5" />
      <!-- Mouse glow -->
      <circle cx="11" cy="24" r="2.5" fill="#00F5FF" />
    </g>

    <!-- Minimal compact keyboard silhouette resting on the mat -->
    <g transform="translate(80, 310) rotate(-6.5)">
      <!-- Keyboard case -->
      <rect x="0" y="0" width="130" height="42" rx="4" fill="#0F111A" stroke="#334155" stroke-width="1.5" />
      <!-- Spacebar & key indicators -->
      <rect x="35" y="32" width="60" height="5" rx="2.5" fill="#3B82F6" />
      <rect x="8" y="8" width="10" height="6" rx="1" fill="#475569" />
      <rect x="22" y="8" width="10" height="6" rx="1" fill="#475569" />
      <rect x="36" y="8" width="10" height="6" rx="1" fill="#475569" />
      <rect x="50" y="8" width="10" height="6" rx="1" fill="#475569" />
      <rect x="64" y="8" width="10" height="6" rx="1" fill="#475569" />
      <rect x="78" y="8" width="10" height="6" rx="1" fill="#475569" />
      <rect x="92" y="8" width="10" height="6" rx="1" fill="#475569" />
      <rect x="106" y="8" width="10" height="6" rx="1" fill="#8B5CF6" />
    </g>
  </g>
</svg>
