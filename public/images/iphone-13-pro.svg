<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="100%" height="100%">
  <defs>
    <!-- Silicone outer gradient -->
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B586E" />
      <stop offset="40%" stop-color="#3A4659" />
      <stop offset="100%" stop-color="#283242" />
    </linearGradient>
    
    <!-- Silicone bevel highlight -->
    <linearGradient id="bevel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3" />
    </linearGradient>

    <!-- Camera ring gradient -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C6B85" />
      <stop offset="100%" stop-color="#1A222D" />
    </linearGradient>

    <!-- Lens glass gradient -->
    <radialGradient id="lens-glass" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1c2d42" />
      <stop offset="70%" stop-color="#0b131c" />
      <stop offset="100%" stop-color="#020406" />
    </radialGradient>

    <!-- Apple logo gradient (subtle debossed look) -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1D2533" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#5C6B85" stop-opacity="0.15" />
    </linearGradient>

    <!-- Drop shadow for the case -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Side Buttons (under the case/extruded) -->
  <!-- Silent switch -->
  <rect x="34" y="170" width="8" height="24" rx="2" fill="#2E3747" />
  <!-- Volume Up -->
  <rect x="34" y="225" width="8" height="50" rx="3" fill="#364254" />
  <!-- Volume Down -->
  <rect x="34" y="295" width="8" height="50" rx="3" fill="#364254" />
  <!-- Power Button -->
  <rect x="358" y="240" width="8" height="75" rx="4" fill="#364254" />

  <!-- Main Case Body (Matched size/roundness to iPhone 17 Pro Max) -->
  <rect x="40" y="40" width="320" height="720" rx="60" fill="url(#body-grad)" filter="url(#shadow)" stroke="url(#bevel-grad)" stroke-width="2" />
  
  <!-- Screen/lip inner edge highlight (Matched size/roundness to iPhone 17 Pro Max) -->
  <rect x="42" y="42" width="316" height="716" rx="58" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />

  <!-- Camera Protection Bump (Raised Square) -->
  <g>
    <!-- Raised square base -->
    <rect x="62" y="62" width="126" height="126" rx="28" fill="url(#ring-grad)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
    <!-- Raised inner rim -->
    <rect x="66" y="66" width="118" height="118" rx="24" fill="none" stroke="#000000" stroke-opacity="0.2" stroke-width="1.5" />
    
    <!-- Lens 1 (Top Left) -->
    <g transform="translate(95, 95)">
      <circle cx="0" cy="0" r="23" fill="#1E2530" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
      <circle cx="0" cy="0" r="19" fill="url(#lens-glass)" />
      <circle cx="-4" cy="-4" r="7" fill="#000000" />
      <!-- Reflection -->
      <circle cx="-5" cy="-5" r="2" fill="#ffffff" opacity="0.4" />
    </g>

    <!-- Lens 2 (Bottom Left) -->
    <g transform="translate(95, 155)">
      <circle cx="0" cy="0" r="23" fill="#1E2530" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
      <circle cx="0" cy="0" r="19" fill="url(#lens-glass)" />
      <circle cx="-4" cy="-4" r="7" fill="#000000" />
      <!-- Reflection -->
      <circle cx="-5" cy="-5" r="2" fill="#ffffff" opacity="0.4" />
    </g>

    <!-- Lens 3 (Right Center) -->
    <g transform="translate(155, 125)">
      <circle cx="0" cy="0" r="23" fill="#1E2530" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
      <circle cx="0" cy="0" r="19" fill="url(#lens-glass)" />
      <circle cx="-4" cy="-4" r="7" fill="#000000" />
      <!-- Reflection -->
      <circle cx="-5" cy="-5" r="2" fill="#ffffff" opacity="0.4" />
    </g>

    <!-- Flash -->
    <circle cx="155" cy="95" r="9" fill="#EAECEE" stroke="#7F8C8D" stroke-width="1" />
    <circle cx="155" cy="95" r="6" fill="#F4D03F" opacity="0.8" />
    
    <!-- LiDAR Sensor -->
    <circle cx="155" cy="155" r="7" fill="#2C3E50" stroke="#1A252F" stroke-width="1" />
    <circle cx="155" cy="155" r="5" fill="#111" />
    
    <!-- Mic hole -->
    <circle cx="127" cy="143" r="2.5" fill="#0D1117" />
  </g>

  <!-- Apple Logo (Debossed/Subtle) -->
  <path d="M200,380 C194,380 188.5,376 182,376 C175.5,376 170.5,380.5 164.5,380.5 C156.5,380.5 147,370.5 147,354 C147,337 157.5,328 168.5,328 C174.5,328 179.5,331.5 183,331.5 C186.5,331.5 190.5,328 197.5,328 C207.5,328 215.5,333.5 219.5,341 C208,346.5 208,361.5 219,366 C216.5,373 210,380.5 200,380 Z M192.5,324 C192.5,315 199.5,308 207.5,308 C208.5,317 199.5,325 192.5,324 Z" 
        fill="url(#logo-grad)" opacity="0.85" />
</svg>
